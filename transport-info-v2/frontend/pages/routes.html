<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Marshrutlar — TransportInfo</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-mark">🚌</div><span>TransportInfo</span></div>
  <nav class="sidebar-nav">
    <a href="/index.html" class="nav-link"><span class="nav-icon">◈</span> Dashboard</a>
    <a href="/pages/routes.html" class="nav-link active"><span class="nav-icon">⟶</span> Marshrutlar</a>
    <a href="/pages/schedule.html" class="nav-link"><span class="nav-icon">◷</span> Jadval</a>
    <a href="/pages/map.html" class="nav-link"><span class="nav-icon">◉</span> Xarita</a>
    <a href="/pages/tickets.html" class="nav-link"><span class="nav-icon">◫</span> Chipta</a>
    <a href="/pages/news.html" class="nav-link"><span class="nav-icon">▣</span> Yangiliklar</a>
    <a href="/pages/admin.html" class="nav-link admin-link"><span class="nav-icon">⚙</span> Admin Panel</a>
  </nav>
  <div class="sidebar-footer">
    <div id="backend-status" style="font-size:11px;margin-bottom:6px"></div>
    <div class="live-indicator"><span class="pulse"></span><span id="clock">00:00:00</span></div>
  </div>
</aside>
<main class="main-content">
  <header class="top-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="header-title"><h1>Marshrutlar</h1><p>Barcha faol transport yo'nalishlari</p></div>
    <div class="header-actions"><button class="btn-outline" onclick="refreshData()">⟳ Yangilash</button><div class="user-badge">Admin</div></div>
  </header>

  <div class="filter-bar" id="filter-bar">
    <button class="chip active" onclick="filterRoutes('all',this)">Barchasi</button>
    <button class="chip" onclick="filterRoutes('bus',this)">🚌 Avtobus</button>
    <button class="chip" onclick="filterRoutes('metro',this)">🚇 Metro</button>
    <button class="chip" onclick="filterRoutes('tram',this)">🚋 Tram</button>
    <button class="chip" onclick="filterRoutes('active',this)">✓ Faol</button>
    <button class="chip" onclick="filterRoutes('delay',this)">⏱ Kechikmoqda</button>
    <button class="chip" onclick="filterRoutes('stopped',this)">⛔ To'xtatilgan</button>
  </div>

  <div class="panel-full">
    <div class="panel-header">
      <h2>Marshrutlar ro'yxati</h2>
      <span class="panel-sub" id="count-label">Yuklanmoqda...</span>
    </div>
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>Raqam</th><th>Tur</th><th>Yo'nalish</th><th>Bekatlar</th><th>Masofa</th><th>Ish vaqti</th><th>Holat</th><th>Jadval</th></tr></thead>
        <tbody id="routes-tbody"><tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">Yuklanmoqda...</td></tr></tbody>
      </table>
    </div>
  </div>
</main>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
let allRoutes = [];
async function loadRoutes() {
  allRoutes = await API.getRoutes();
  renderTable(allRoutes);
}
function renderTable(routes) {
  document.getElementById('count-label').textContent = routes.length + ' ta marshrut';
  document.getElementById('routes-tbody').innerHTML = routes.length === 0
    ? '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">Marshrut topilmadi</td></tr>'
    : routes.map(r =>
      '<tr>' +
      '<td><span class="route-num ' + typeClass(r.type) + '" style="display:inline-flex">' + r.number + '</span></td>' +
      '<td style="color:var(--text-secondary)">' + r.type + '</td>' +
      '<td style="font-weight:500">' + r.name + '</td>' +
      '<td>' + r.stops + ' ta</td>' +
      '<td>' + r.km + ' km</td>' +
      '<td style="font-family:monospace;font-size:12px">' + r.hours + '</td>' +
      '<td>' + statusBadge(r.status) + '</td>' +
      '<td><a href="/pages/schedule.html?id=' + r.id + '" style="color:var(--green-text);font-size:12px;text-decoration:none">Ko\'rish →</a></td>' +
      '</tr>'
    ).join('');
}
function filterRoutes(key, btn) {
  document.querySelectorAll('#filter-bar .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  const filtered = key === 'all' ? allRoutes : allRoutes.filter(r => r.type === key || r.status === key);
  renderTable(filtered);
}
loadRoutes();
</script>
</body>
</html>
