<!DOCTYPE html>
<html lang="uz" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Jadval — TransportInfo</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-mark">🚌</div><span>TransportInfo</span></div>
  <nav class="sidebar-nav">
    <a href="/index.html"          class="nav-link"        data-page="dashboard"><span class="nav-icon">◈</span> Dashboard</a>
    <a href="/pages/routes.html"   class="nav-link"        data-page="routes">   <span class="nav-icon">⟶</span> Marshrutlar</a>
    <a href="/pages/schedule.html" class="nav-link active" data-page="schedule"> <span class="nav-icon">◷</span> Jadval</a>
    <a href="/pages/map.html"      class="nav-link"        data-page="map">      <span class="nav-icon">◉</span> Xarita</a>
    <a href="/pages/tickets.html"  class="nav-link"        data-page="tickets">  <span class="nav-icon">◫</span> Chipta</a>
    <a href="/pages/news.html"     class="nav-link"        data-page="news">     <span class="nav-icon">▣</span> Yangiliklar</a>
    <a href="/pages/admin.html"    class="nav-link nav-link-admin" data-page="admin"><span class="nav-icon">⚙</span> Admin Panel</a>
  </nav>
  <div class="sidebar-footer">
    <div id="backend-status"></div>
    <div class="sidebar-user">
      <div id="sidebar-user-info"></div>
      <button class="btn-logout" onclick="authLogout()">Chiqish →</button>
    </div>
    <div class="live-indicator"><span class="pulse"></span><span id="clock">00:00:00</span></div>
  </div>
</aside>

<main class="main-content">
  <header class="top-header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <div class="header-title"><h1>Jadval</h1><p>Marshrut bekat-vaqt jadvali</p></div>
    <div class="header-actions">
      <button class="theme-toggle" onclick="toggleTheme()" title="Tema"><span class="theme-icon">☀️</span></button>
      <div class="user-badge" id="user-badge">Admin</div>
    </div>
  </header>

  <div class="filter-bar" id="type-filter-bar">
    <button class="chip active" onclick="filterType('all',this)">Barchasi</button>
    <button class="chip" onclick="filterType('bus',this)">🚌 Avtobus</button>
    <button class="chip" onclick="filterType('metro',this)">🚇 Metro</button>
    <button class="chip" onclick="filterType('tram',this)">🚋 Tram</button>
  </div>

  <div style="padding:0 28px 0">
    <div class="panel" style="max-width:560px">
      <div class="panel-header"><h2>Marshrut tanlash</h2></div>
      <div style="padding:16px;display:flex;gap:10px">
        <select id="route-select" class="form-control" style="flex:1" onchange="loadSchedule()">
          <option value="">Yuklanmoqda...</option>
        </select>
        <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="loadSchedule()">Ko'rish</button>
      </div>
    </div>
  </div>

  <div class="filter-bar" id="sched-filter-bar">
    <button class="chip active" onclick="filterSched('all',this)">Barchasi</button>
    <button class="chip" onclick="filterSched('passed',this)">✓ O'tdi</button>
    <button class="chip" onclick="filterSched('coming',this)">→ Kelmoqda</button>
    <button class="chip" onclick="filterSched('active',this)">● Faol</button>
    <button class="chip" onclick="filterSched('delay',this)">⏱ Kechikmoqda</button>
    <button class="chip" onclick="filterSched('pending',this)">– Kutilmoqda</button>
  </div>

  <div class="panel-full">
    <div class="panel-header">
      <h2 id="sched-title">Jadval</h2>
      <span class="panel-sub"><span class="pulse-dot"></span> Jonli yangilanish</span>
    </div>
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>#</th><th>Vaqt</th><th>Bekat</th><th>Holat</th></tr></thead>
        <tbody id="sched-body"><tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-muted)">Marshrut tanlang</td></tr></tbody>
      </table>
    </div>
  </div>
</main>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
const urlId = new URLSearchParams(location.search).get('id');
let allRows = [];
let allRoutes = [];

function populateSelect(routes) {
  const sel = document.getElementById('route-select');
  sel.innerHTML = routes.length
    ? routes.map(r => '<option value="' + r.id + '">' + r.number + ' — ' + r.name + '</option>').join('')
    : '<option value="">Marshrut topilmadi</option>';
}

function filterType(type, btn) {
  document.querySelectorAll('#type-filter-bar .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  populateSelect(type === 'all' ? allRoutes : allRoutes.filter(r => r.type === type));
  loadSchedule();
}

async function initRouteSelect() {
  const sel = document.getElementById('route-select');
  try {
    const res = await fetch('/api/routes');
    const json = await res.json();
    if (json.success && json.data.length) { allRoutes = json.data; populateSelect(allRoutes); }
  } catch (e) {
    sel.innerHTML = '<option value="">Marshrutlar yuklanmadi</option>';
  }
  if (urlId) { sel.value = urlId; loadSchedule(); }
  else if (sel.value) loadSchedule();
}

function renderRows(rows) {
  document.getElementById('sched-body').innerHTML = rows.length === 0
    ? '<tr><td colspan="4"><div class="empty-state"><div class="empty-state-icon">🕐</div><div class="empty-state-title">Bekat topilmadi</div></div></td></tr>'
    : rows.map((row, i) =>
        '<tr>' +
        '<td style="color:var(--text-muted);font-size:12px">' + (i+1) + '</td>' +
        '<td style="font-family:var(--font-mono);font-weight:600;color:var(--text-primary)">' + row.time + '</td>' +
        '<td>' + row.stop + '</td>' +
        '<td>' + statusBadge(row.status) + '</td>' +
        '</tr>'
      ).join('');
}

function filterSched(status, btn) {
  document.querySelectorAll('#sched-filter-bar .chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderRows(status === 'all' ? allRows : allRows.filter(r => r.status === status));
}

async function loadSchedule() {
  const id = document.getElementById('route-select').value;
  if (!id) return;
  document.querySelectorAll('#sched-filter-bar .chip').forEach(c => c.classList.remove('active'));
  document.querySelector('#sched-filter-bar .chip').classList.add('active');
  document.getElementById('sched-body').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text-muted)">Yuklanmoqda...</td></tr>';
  const data = await API.getSchedule(id);
  if (!data) {
    document.getElementById('sched-body').innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--red-text)">Jadval topilmadi</td></tr>';
    return;
  }
  allRows = data.timetable;
  document.getElementById('sched-title').textContent = data.route;
  renderRows(allRows);
}

initRouteSelect();
</script>
</body>
</html>
